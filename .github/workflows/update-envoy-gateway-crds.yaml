name: Update Envoy Gateway CRDs

on:
  schedule:
    - cron: "30 8 * * *" # daily at 08:30 UTC (offset from gateway-api-crds at 08:00)
  workflow_dispatch: {}

jobs:
  update-crds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.CONTIAMO_CI_TOKEN }}

      - name: Get latest stable Envoy Gateway release
        id: latest
        run: |
          VERSION=$(gh api repos/envoyproxy/gateway/releases \
            --jq '[.[] | select(.prerelease == false and .draft == false)][0].tag_name')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Latest stable release: ${VERSION}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check if version already exists
        id: check
        run: |
          VERSION="${{ steps.latest.outputs.version }}"
          if [[ -f "envoy-gateway/crds/envoy-crds-${VERSION}.yaml" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} already exists — nothing to do."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "New version ${VERSION} found — updating."
          fi

      - name: Install helm
        if: steps.check.outputs.skip == 'false'
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Install yq
        if: steps.check.outputs.skip == 'false'
        uses: mikefarah/yq@master

      - name: Run update script
        if: steps.check.outputs.skip == 'false'
        run: ./envoy-gateway/scripts/update-envoy-crds.sh "${{ steps.latest.outputs.version }}"

      - name: Create pull request
        if: steps.check.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.latest.outputs.version }}"
          BRANCH="chore/envoy-gateway-crds-${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add envoy-gateway/
          git commit -m "feat(envoy-gateway): add CRDs ${VERSION}"
          git push -u origin "$BRANCH"

          cat > /tmp/pr-body.md <<PREOF
          ## Summary

          Adds Envoy Gateway CRD version **${VERSION}** rendered from
          [\`gateway-crds-helm\`](https://gateway.envoyproxy.io/docs/install/install-helm/).

          - Rendered the chart (envoyGateway CRDs only) to \`envoy-gateway/crds/envoy-crds-${VERSION}.yaml\`
          - Updated manifest keys in \`envoy-gateway/locals.tf\`
          - Bumped default version in \`envoy-gateway/variables.tf\` and \`envoy-gateway/README.md\`

          See the [Envoy Gateway compatibility matrix](https://gateway.envoyproxy.io/news/releases/matrix/)
          for which Gateway API version pairs with this chart version.

          Auto-generated by the \`update-envoy-gateway-crds\` workflow.
          PREOF

          gh pr create \
            --title "feat(envoy-gateway): add CRDs ${VERSION}" \
            --body-file /tmp/pr-body.md
        env:
          GH_TOKEN: ${{ secrets.CONTIAMO_CI_TOKEN }}
