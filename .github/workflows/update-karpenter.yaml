name: Update Karpenter

on:
  schedule:
    - cron: "15 9 * * *" # daily at 09:15 UTC (offset from gateway-api-crds 08:00, envoy-gateway 08:30, onepassword-connect 08:45)
  workflow_dispatch: {}

jobs:
  update-karpenter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.CONTIAMO_CI_TOKEN }}

      - name: Get latest stable Karpenter release
        id: latest
        run: |
          # Karpenter release tags on aws/karpenter-provider-aws are plain
          # SemVer prefixed with "v" (e.g. v1.12.0). Filter to non-prerelease,
          # strip the v, and pick the highest by semantic version (publication
          # date can lie if a patch on an older minor is backported later).
          VERSION=$(gh api repos/aws/karpenter-provider-aws/releases \
            --jq '.[] | select(.prerelease == false and .draft == false) | .tag_name | sub("^v"; "")' \
            | sort -V | tail -n1)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Latest stable release: ${VERSION}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check if version already exists
        id: check
        run: |
          VERSION="${{ steps.latest.outputs.version }}"
          if [[ -f "karpenter/charts/karpenter-${VERSION}.tgz" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} already exists — nothing to do."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "New version ${VERSION} found — updating."
          fi

      - name: Install helm
        if: steps.check.outputs.skip == 'false'
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Run update script
        if: steps.check.outputs.skip == 'false'
        run: ./karpenter/scripts/update-karpenter.sh "${{ steps.latest.outputs.version }}"

      - name: Create pull request
        if: steps.check.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.latest.outputs.version }}"
          BRANCH="chore/karpenter-${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add karpenter/
          git commit -m "feat(karpenter): add Karpenter ${VERSION}"
          git push -u origin "$BRANCH"

          DIGEST=$(cat "karpenter/charts/karpenter-${VERSION}.tgz.sha256")

          cat > /tmp/pr-body.md <<PREOF
          ## Summary

          Adds Karpenter version **${VERSION}** from
          [aws/karpenter-provider-aws@v${VERSION}](https://github.com/aws/karpenter-provider-aws/releases/tag/v${VERSION}).

          - Pulled \`oci://public.ecr.aws/karpenter/karpenter\` at version \`${VERSION}\` to \`karpenter/charts/karpenter-${VERSION}.tgz\`.
          - OCI manifest digest: \`${DIGEST}\` (saved as \`.sha256\` sidecar; verify with \`helm pull\` if needed).
          - Downloaded the four v1 CRD YAMLs to \`karpenter/crds/${VERSION}/\`.
          - Added \`${VERSION}\` to \`karpenter/locals.tf\` \`supported_versions\`.
          - Bumped default in \`karpenter/variables.tf\` and the example in \`karpenter/README.md\`.

          Reviewer: **diff the new CRD files against the previous version** to catch schema-breaking changes before merge.

          Auto-generated by the \`update-karpenter\` workflow.
          PREOF

          gh pr create \
            --title "feat(karpenter): add Karpenter ${VERSION}" \
            --body-file /tmp/pr-body.md
        env:
          GH_TOKEN: ${{ secrets.CONTIAMO_CI_TOKEN }}
