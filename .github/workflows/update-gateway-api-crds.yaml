name: Update Gateway API CRDs

on:
  schedule:
    - cron: "0 8 * * *" # daily at 08:00 UTC
  workflow_dispatch: {}

jobs:
  update-crds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.CONTIAMO_CI_TOKEN }}

      - name: Get latest stable Gateway API release
        id: latest
        run: |
          VERSION=$(gh api repos/kubernetes-sigs/gateway-api/releases \
            --jq '[.[] | select(.prerelease == false and .draft == false)][0].tag_name')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Latest stable release: ${VERSION}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check if version already exists
        id: check
        run: |
          VERSION="${{ steps.latest.outputs.version }}"
          if [[ -f "gateway-api-crds/crds/${VERSION}-standard-install.yaml" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} already exists — nothing to do."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "New version ${VERSION} found — updating."
          fi

      - name: Install yq
        if: steps.check.outputs.skip == 'false'
        uses: mikefarah/yq@master

      - name: Run update script
        if: steps.check.outputs.skip == 'false'
        run: ./gateway-api-crds/scripts/update-crds.sh "${{ steps.latest.outputs.version }}"

      - name: Create pull request
        if: steps.check.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.latest.outputs.version }}"
          BRANCH="chore/gateway-api-crds-${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add gateway-api-crds/
          git commit -m "feat(gateway-api-crds): add CRDs ${VERSION}"
          git push -u origin "$BRANCH"

          cat > /tmp/pr-body.md <<PREOF
          ## Summary

          Adds Gateway API CRD version **${VERSION}** from [upstream release](https://github.com/kubernetes-sigs/gateway-api/releases/tag/${VERSION}).

          - Downloaded \`standard-install.yaml\` to \`crds/${VERSION}-standard-install.yaml\`
          - Updated manifest keys in \`locals.tf\`
          - Bumped default version in \`variables.tf\` and \`README.md\`

          Auto-generated by the \`update-gateway-api-crds\` workflow.
          PREOF

          gh pr create \
            --title "feat(gateway-api-crds): add CRDs ${VERSION}" \
            --body-file /tmp/pr-body.md
        env:
          GH_TOKEN: ${{ secrets.CONTIAMO_CI_TOKEN }}
