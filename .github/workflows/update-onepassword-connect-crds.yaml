name: Update 1Password Connect CRDs

on:
  schedule:
    - cron: "45 8 * * *" # daily at 08:45 UTC (offset from gateway-api-crds at 08:00 and envoy-gateway at 08:30)
  workflow_dispatch: {}

jobs:
  update-crds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.CONTIAMO_CI_TOKEN }}

      - name: Get latest stable 1Password Connect chart release
        id: latest
        run: |
          # Release tags in 1Password/connect-helm-charts are prefixed with
          # the chart name (e.g. `connect-2.4.1`, `secrets-injector-1.2.0`)
          # because the repo ships multiple charts. Filter for `connect-*`,
          # strip the prefix, then pick the highest semantic version — the
          # API returns releases by publication date, so a backported patch
          # on an older minor line could otherwise outrank the latest minor.
          VERSION=$(gh api repos/1Password/connect-helm-charts/releases \
            --jq '.[] | select(.prerelease == false and .draft == false) | .tag_name | select(startswith("connect-")) | sub("^connect-"; "")' \
            | sort -V | tail -n1)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Latest stable release: ${VERSION}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check if version already exists
        id: check
        run: |
          VERSION="${{ steps.latest.outputs.version }}"
          if [[ -f "onepassword-connect/crds/onepassword-crd-${VERSION}.yaml" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} already exists — nothing to do."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "New version ${VERSION} found — updating."
          fi

      - name: Install helm
        if: steps.check.outputs.skip == 'false'
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Install yq
        if: steps.check.outputs.skip == 'false'
        uses: mikefarah/yq@master

      - name: Run update script
        if: steps.check.outputs.skip == 'false'
        run: ./onepassword-connect/scripts/update-onepassword-crds.sh "${{ steps.latest.outputs.version }}"

      - name: Create pull request
        if: steps.check.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.latest.outputs.version }}"
          BRANCH="chore/onepassword-connect-crds-${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add onepassword-connect/
          git commit -m "feat(onepassword-connect): add CRDs ${VERSION}"
          git push -u origin "$BRANCH"

          cat > /tmp/pr-body.md <<PREOF
          ## Summary

          Adds 1Password Connect CRD version **${VERSION}** extracted from
          [\`1password/connect\`](https://github.com/1Password/connect-helm-charts)
          Helm chart.

          - Pulled the chart and copied \`crds/onepassworditem-crd.yaml\` to
            \`onepassword-connect/crds/onepassword-crd-${VERSION}.yaml\`
          - Updated manifest keys in \`onepassword-connect/locals.tf\`
          - Bumped default version in \`onepassword-connect/variables.tf\` and
            \`onepassword-connect/README.md\`

          Reviewer: **diff the new CRD file against the previous version** to
          catch schema-breaking changes before merge.

          Auto-generated by the \`update-onepassword-connect-crds\` workflow.
          PREOF

          gh pr create \
            --title "feat(onepassword-connect): add CRDs ${VERSION}" \
            --body-file /tmp/pr-body.md
        env:
          GH_TOKEN: ${{ secrets.CONTIAMO_CI_TOKEN }}
